<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monopole Dreams - Home</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000000; /* Pantalla negra */
            color: #ffffff; /* Letras blancas */
            font-family: Arial, sans-serif; /* Letras simples */
            display: flex;
            height: 100vh; /* Ocupa todo el alto de la pantalla */
            align-items: center; /* Centrado vertical */
            justify-content: center; /* Centrado horizontal */
            font-size: 2rem;
        }
        .container {
            display: flex;
            width: 50%; /* Ancho del contenedor de los enlaces */
            justify-content: space-between; /* Espacio entre ellos */
        }
        a {
            color: #ffffff;
            text-decoration: none; /* Sin subrayado */
            cursor: pointer;
        }
        a:hover {
            opacity: 0.7; /* Pequeño efecto al pasar el mouse */
        }
    </style>
</head>
