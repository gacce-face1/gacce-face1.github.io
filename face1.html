<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Face 1</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000000;
            display: flex;
            height: 100vh;
            align-items: center;
            justify-content: center;
        }
        /* El ojo de gato hecho con código */
        .cat-eye {
            width: 150px;
            height: 80px;
            background-color: #00ff00; /* Verde brillante */
            border-radius: 50%; /* Forma elíptica */
            position: relative;
            box-shadow: 0 0 30px #00ff00; /* Resplandor verde */
            overflow: hidden;
        }
        /* La pupila rasgada */
        .pupil {
            width: 20px;
            height: 100%;
            background-color: #000000; /* Pupila negra */
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            border-radius: 50% / 10%; /* Forma rasgada */
        }
    </style>
</head>
<body>
    <div class="cat-eye">
        <div class="pupil"></div>
    </div>
</body>
</html>
